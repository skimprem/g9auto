# Calibration data for laser wavelengths and Rb frequency standard.
# Used for linear interpolation to any date within the covered range.
calibration:

  # Laser wavelengths (HeNe iodine-stabilized, L Series).
  # Units: fm (femtometres, 1e-15 m). Values represent the measured
  # wavelength of the red (632 nm) and blue (doubled) beams.
  # ste — standard error of the mean of the calibration measurement.
  laser:
    - date: 2022-08-01
      red: 632.9902642
      red_ste: 0.633
      blue: 632.9912568
      blue_ste: 0.633
      type: ref
    - date: 2024-09-01
      red: 632.990285076
      red_ste: 0.036
      blue: 632.991249743
      blue_ste: 0.036
      type: ref
    - date: 2025-10-23
      red: 632.990269144
      red_ste: 0.038
      blue: 632.991258559
      blue_ste: 0.038
      type: ref

  # Rubidium frequency standard calibration.
  # Units: MHz (megahertz). Nominal value is 10 MHz.
  # The g9 app expects the frequency in Hz — multiply by 1e6 before use.
  # ste — standard error of the mean of the calibration measurement.
  rubidium:
    - date: 2022-08-01
      frequency: 10.00000000001
      frequency_ste: 1.0e-8
      type: ref
    - date: 2023-09-01
      frequency: 9.99999999753
      frequency_ste: 1.22e-11
      type: ref
    - date: 2024-09-01
      frequency: 9.99999999739
      frequency_ste: 5.8e-12
      type: ref

processing:
  # Date of the measurement to process. Used for interpolation of calibration data.
  timeout_seconds: 60